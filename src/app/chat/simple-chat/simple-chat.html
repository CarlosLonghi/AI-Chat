<mat-card class="chat-container">
  <mat-card-header>
    <mat-card-title>Simple Chat</mat-card-title>
  </mat-card-header>
  <mat-card-content class="chat-content">
    <div class="messages">
      @for (message of messages(); track $index) {
        <div class="message">
          <div class="message-bubble" [ngClass]="{'user': message.sender === 'user', 'bot': message.sender === 'bot'}">
            {{ message.text }}
          </div>
        </div>
      }
    </div>
  </mat-card-content>

  <div class="chat-input">
    <mat-form-field class="full-width">
      <mat-label>Ask a question...</mat-label>
      <input matInput
        [ngModel]="userInput()"
        (ngModelChange)="userInput.set($event)"
        (keyup.enter)="sendMessage()"
        maxlength="256"
        placeholder="Type your question here"
      />
      <mat-hint align="end">{{userInput().length}} / 256</mat-hint>

      <button matSuffix matIconButton aria-label="Send" (click)="sendMessage()">
        <mat-icon>send</mat-icon>
      </button>
    </mat-form-field>
  </div>
</mat-card>
